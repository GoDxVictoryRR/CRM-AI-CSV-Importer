version: '3.9'

services:
  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: groweasy_backend
    env_file:
      - ./backend/.env          # Contains GEMINI_API_KEY, PORT, NODE_ENV, FRONTEND_ORIGIN
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Build-time env var baked into the Next.js bundle
        NEXT_PUBLIC_BACKEND_URL: http://backend:5000
    container_name: groweasy_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
